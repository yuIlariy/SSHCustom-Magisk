name: Build SSHCustom

# Triggers:
#   - Every push to main rebuilds and uploads artifacts (sanity check).
#   - Every push of a v* tag (e.g. v2.0.0) builds and creates a GitHub
#     Release with the module ZIP attached. This is the user-facing release.
#   - Pull requests build but do not release.
#   - Manual dispatch is enabled for ad-hoc rebuilds from the Actions tab.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache: true

      # Read the canonical version once and expose it to every later step.
      # The VERSION file is the single source of truth that flows into the
      # daemon binary, module.prop, and these artifact names.
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Build flashable module
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-Magisk-v${{ steps.ver.outputs.version }}
          path: |
            dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
            src/module/bin/arm64/sshcustomd
            src/module/bin/arm/sshcustomd

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
