name: Build SSHCustom

# Triggers:
#   - Every push to main rebuilds and uploads artifacts (sanity check).
#   - Every push of a v* tag (e.g. v2.0.0) builds and creates a GitHub
#     Release with the module ZIP and signed APK attached.
#   - Pull requests build but do not release.
#   - Manual dispatch is enabled for ad-hoc rebuilds from the Actions tab.
#
# Three jobs:
#   - module-and-daemon: builds the Magisk/KernelSU module ZIP via build.sh.
#   - app: assembles the companion Android APK (debug always, release when
#     the four signing secrets are present).
#   - release: collects both artifacts on tag pushes and attaches them to
#     the GitHub Release.
#
# Signing keys are read from these repository secrets (set them once):
#   KEYSTORE_BASE64    — base64 of the .jks keystore
#   KEYSTORE_PASSWORD  — store password
#   KEY_ALIAS          — alias inside the keystore
#   KEY_PASSWORD       — per-key password
# See scripts/generate-release-keystore.sh.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  module-and-daemon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache: true

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Build flashable module
        run: ./build.sh

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-Magisk-v${{ steps.ver.outputs.version }}
          path: |
            dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
            src/module/bin/arm64/sshcustomd
            src/module/bin/arm/sshcustomd

  app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: false

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # Determine if signing secrets are configured. When they aren't (forks,
      # PRs from outside collaborators), only the debug APK is built.
      - name: Check signing config
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "release=yes" >> "$GITHUB_OUTPUT"
          else
            echo "release=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --warning-mode all --stacktrace

      - name: Assemble release APK
        if: steps.signing.outputs.release == 'yes'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon --warning-mode all --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-app-v${{ steps.ver.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: steps.signing.outputs.release == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: SSHCustom-app-v${{ steps.ver.outputs.version }}-release
          path: app/build/outputs/apk/release/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [module-and-daemon, app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Download module ZIP
        uses: actions/download-artifact@v4
        with:
          name: SSHCustom-Magisk-v${{ steps.ver.outputs.version }}
          path: out/module

      - name: Download release APK (if produced)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: SSHCustom-app-v${{ steps.ver.outputs.version }}-release
          path: out/app

      - name: Download debug APK (fallback)
        if: ${{ hashFiles('out/app/*.apk') == '' }}
        uses: actions/download-artifact@v4
        with:
          name: SSHCustom-app-v${{ steps.ver.outputs.version }}-debug
          path: out/app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/module/dist/SSHCustom-Magisk-v${{ steps.ver.outputs.version }}.zip
            out/app/*.apk
          generate_release_notes: true
